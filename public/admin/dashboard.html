<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка - САН ЛАЙФ CMS</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>САН ЛАЙФ CMS</h2>
        <p id="userName" class="user-name"></p>
      </div>
      
      <nav>
        <ul class="sidebar-nav" id="sidebarNav">
          <!-- Menu items injected by JS based on permissions -->
        </ul>
      </nav>
      
      <div class="sidebar-footer">
        <button class="btn btn-secondary" style="width:100%" onclick="logout()">
          <span class="icon">🚪</span> Выйти
        </button>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="page-header">
        <h1 id="pageTitle">Редактор контента</h1>
      </div>
      
      <div id="editorContainer">
        <p class="loading"><span class="spinner"></span> Загрузка...</p>
      </div>
    </main>
  </div>
  
  <script src="js/admin.js"></script>
</body>
</html>

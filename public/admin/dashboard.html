<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админка - САН ЛАЙФ CMS</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>САН ЛАЙФ CMS</h2>
      </div>
      
      <nav>
        <ul class="sidebar-nav">
          <li><a href="#" data-file="pricing" class="active"><span class="icon">💰</span> Цены</a></li>
          <li><a href="#" data-file="faq"><span class="icon">❓</span> FAQ</a></li>
          <li><a href="#" data-file="gallery"><span class="icon">🖼</span> Галерея</a></li>
          <li><a href="#" data-file="benefits"><span class="icon">⭐</span> Преимущества</a></li>
          <li><a href="#" data-file="reviews"><span class="icon">💬</span> Отзывы</a></li>
          <li><a href="#" data-file="steps"><span class="icon">👶</span> Почему мы</a></li>
          <li><a href="#" data-file="geography"><span class="icon">🗺</span> География</a></li>
          <li><a href="#" data-file="partnership"><span class="icon">🤝</span> Партнёрство</a></li>
          <li><a href="#" data-file="meta"><span class="icon">🔎</span> SEO</a></li>
        </ul>
      </nav>
      
      <div class="sidebar-footer">
        <button class="btn btn-secondary" style="width:100%" onclick="logout()">
          <span class="icon">🚪</span> Выйти
        </button>
      </div>
    </aside>
    
    <main class="main-content">
      <div class="page-header">
        <h1>Редактор контента</h1>
      </div>
      
      <div id="editorContainer">
        <p class="loading"><span class="spinner"></span> Загрузка...</p>
      </div>
    </main>
  </div>
  
  <script src="js/admin.js"></script>
</body>
</html>

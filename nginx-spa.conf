# Nginx конфиг для SPA (React Router)
# Добавьте это в конфиг сайта на сервере

server {
    listen 80;
    server_name sunlife-photo.ru www.sunlife-photo.ru;
    root /var/www/s273478/data/www;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # Кэш статики
    location ~* \.(webp|jpg|jpeg|png|svg|css|js|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API и админка — не трогать
    location ~ ^/(api|admin)/ {
        try_files $uri $uri/ =404;
    }

    # Всё остальное — в index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 404 страница
    error_page 404 /index.html;
}
